<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lull — Drift into focus</title>
  <meta name="description" content="A calm, beautiful focus timer with ambient ocean sounds. Drift into focus." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Immersive background overlay (fades in/out via opacity so it can be transitioned) -->
  <div class="bg-immersive-overlay" aria-hidden="true"></div>

  <!-- Fish shadows (behind the wave silhouettes so deeper ones are subtly obscured) -->
  <div class="fish-shadows immersive-only" aria-hidden="true">
    <!-- Large lone fish, upper, left to right -->
    <div class="fish-swim ltr" style="top: 22%; animation-duration: 68s; animation-delay: 4s;">
      <svg viewBox="0 0 32 16" width="92" height="46">
        <path class="fish-body" d="M 28 8 Q 17 13 8 8 L 2 12 L 6 8 L 2 4 L 8 8 Q 17 3 28 8 Z"/>
      </svg>
    </div>

    <!-- Small school, mid, left to right -->
    <div class="fish-swim ltr" style="top: 46%; animation-duration: 82s; animation-delay: 22s;">
      <svg viewBox="0 0 90 50" width="170" height="94">
        <g class="fish-body">
          <path d="M 28 8 Q 17 13 8 8 L 2 12 L 6 8 L 2 4 L 8 8 Q 17 3 28 8 Z" transform="translate(0, 6) scale(0.6)"/>
          <path d="M 28 8 Q 17 13 8 8 L 2 12 L 6 8 L 2 4 L 8 8 Q 17 3 28 8 Z" transform="translate(15, 18) scale(0.5)"/>
          <path d="M 28 8 Q 17 13 8 8 L 2 12 L 6 8 L 2 4 L 8 8 Q 17 3 28 8 Z" transform="translate(30, 8) scale(0.55)"/>
          <path d="M 28 8 Q 17 13 8 8 L 2 12 L 6 8 L 2 4 L 8 8 Q 17 3 28 8 Z" transform="translate(48, 26) scale(0.5)"/>
          <path d="M 28 8 Q 17 13 8 8 L 2 12 L 6 8 L 2 4 L 8 8 Q 17 3 28 8 Z" transform="translate(58, 12) scale(0.6)"/>
        </g>
      </svg>
    </div>

    <!-- Small school, lower, right to left -->
    <div class="fish-swim rtl" style="top: 64%; animation-duration: 74s; animation-delay: 38s;">
      <svg viewBox="0 0 80 36" width="140" height="64">
        <g class="fish-body">
          <path d="M 28 8 Q 17 13 8 8 L 2 12 L 6 8 L 2 4 L 8 8 Q 17 3 28 8 Z" transform="translate(0, 4) scale(0.55)"/>
          <path d="M 28 8 Q 17 13 8 8 L 2 12 L 6 8 L 2 4 L 8 8 Q 17 3 28 8 Z" transform="translate(18, 14) scale(0.5)"/>
          <path d="M 28 8 Q 17 13 8 8 L 2 12 L 6 8 L 2 4 L 8 8 Q 17 3 28 8 Z" transform="translate(40, 6) scale(0.6)"/>
        </g>
      </svg>
    </div>

    <!-- Deeper single fish, right to left -->
    <div class="fish-swim rtl" style="top: 80%; animation-duration: 94s; animation-delay: 58s;">
      <svg viewBox="0 0 32 16" width="62" height="30">
        <path class="fish-body" d="M 28 8 Q 17 13 8 8 L 2 12 L 6 8 L 2 4 L 8 8 Q 17 3 28 8 Z"/>
      </svg>
    </div>
  </div>

  <!-- Animated aquatic background -->
  <div class="ocean-bg">
    <div class="caustics"></div>
    <svg class="waves" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path class="wave wave-1" d="M0,160 C320,260 720,80 1440,180 L1440,320 L0,320 Z"></path>
      <path class="wave wave-2" d="M0,200 C360,120 720,260 1440,160 L1440,320 L0,320 Z"></path>
      <path class="wave wave-3" d="M0,240 C400,180 800,300 1440,220 L1440,320 L0,320 Z"></path>
      <path class="wave wave-4 immersive-only" d="M0,140 C300,220 660,60 1440,150 L1440,320 L0,320 Z"></path>
      <path class="wave wave-5 immersive-only" d="M0,260 C320,180 760,280 1440,200 L1440,320 L0,320 Z"></path>
    </svg>
    <div class="particles"></div>
  </div>

  <!-- Immersive overlays (visible only when immersive mode is on) -->
  <div class="bubbles immersive-only" aria-hidden="true">
    <span class="bubble" style="left:  6%; width: 14px; height: 14px; animation-duration: 19s; animation-delay:  0s;"></span>
    <span class="bubble" style="left: 14%; width:  8px; height:  8px; animation-duration: 24s; animation-delay:  4s;"></span>
    <span class="bubble" style="left: 22%; width: 22px; height: 22px; animation-duration: 17s; animation-delay:  8s;"></span>
    <span class="bubble" style="left: 30%; width: 10px; height: 10px; animation-duration: 26s; animation-delay:  2s;"></span>
    <span class="bubble" style="left: 38%; width: 16px; height: 16px; animation-duration: 21s; animation-delay: 11s;"></span>
    <span class="bubble" style="left: 47%; width:  6px; height:  6px; animation-duration: 28s; animation-delay:  6s;"></span>
    <span class="bubble" style="left: 55%; width: 19px; height: 19px; animation-duration: 18s; animation-delay: 14s;"></span>
    <span class="bubble" style="left: 63%; width:  9px; height:  9px; animation-duration: 23s; animation-delay:  1s;"></span>
    <span class="bubble" style="left: 71%; width: 14px; height: 14px; animation-duration: 16s; animation-delay:  9s;"></span>
    <span class="bubble" style="left: 79%; width: 11px; height: 11px; animation-duration: 22s; animation-delay:  5s;"></span>
    <span class="bubble" style="left: 87%; width:  7px; height:  7px; animation-duration: 27s; animation-delay: 13s;"></span>
    <span class="bubble" style="left: 94%; width: 13px; height: 13px; animation-duration: 20s; animation-delay:  7s;"></span>
  </div>

  <div class="light-rays immersive-only" aria-hidden="true">
    <span class="light-ray" style="left: 12%; animation-duration: 18s; animation-delay:  0s;"></span>
    <span class="light-ray" style="left: 30%; animation-duration: 22s; animation-delay:  4s;"></span>
    <span class="light-ray" style="left: 50%; animation-duration: 17s; animation-delay:  9s;"></span>
    <span class="light-ray" style="left: 70%; animation-duration: 24s; animation-delay:  3s;"></span>
    <span class="light-ray" style="left: 88%; animation-duration: 19s; animation-delay: 12s;"></span>
  </div>

  <!-- Immersive toggle (top-right) -->
  <button class="immersive-toggle" id="immersiveToggle" type="button" aria-label="Toggle immersive mode" aria-pressed="false">
    <span class="immersive-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="14" height="14">
        <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    <span class="immersive-label">Immersive</span>
    <span class="pro-badge" aria-label="Pro feature">PRO</span>
  </button>

  <!-- App shell -->
  <main class="app">
    <header class="header">
      <h1 class="brand">lull<span class="brand-dot">~</span></h1>
      <p class="tagline">Drift into focus.</p>
    </header>

    <!-- Timer -->
    <section class="timer-card glass">
      <div class="duration-row">
        <div class="duration-control" data-phase="focus" tabindex="0" role="spinbutton" aria-label="Focus duration in minutes" aria-valuemin="1" aria-valuemax="120" aria-valuenow="25">
          <span class="duration-label">Focus</span>
          <div class="duration-wheel">
            <button class="wheel-arrow up" data-dir="up" aria-label="Increase focus duration">⌃</button>
            <span class="duration-number" id="focusDuration">25</span>
            <button class="wheel-arrow down" data-dir="down" aria-label="Decrease focus duration">⌄</button>
          </div>
          <span class="duration-unit">min</span>
        </div>

        <div class="duration-divider" aria-hidden="true"></div>

        <div class="duration-control" data-phase="break" tabindex="0" role="spinbutton" aria-label="Break duration in minutes" aria-valuemin="1" aria-valuemax="60" aria-valuenow="5">
          <span class="duration-label">Break</span>
          <div class="duration-wheel">
            <button class="wheel-arrow up" data-dir="up" aria-label="Increase break duration">⌃</button>
            <span class="duration-number" id="breakDuration">5</span>
            <button class="wheel-arrow down" data-dir="down" aria-label="Decrease break duration">⌄</button>
          </div>
          <span class="duration-unit">min</span>
        </div>
      </div>

      <div class="timer-ring-wrap">
        <svg class="timer-ring" viewBox="0 0 240 240">
          <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#a8e6dc" />
              <stop offset="100%" stop-color="#4d9aaf" />
            </linearGradient>
            <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#c8eee5" stop-opacity="0.95" />
              <stop offset="100%" stop-color="#7fd1c5" stop-opacity="0.7" />
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="120" cy="120" r="108" />
          <circle class="ring-progress" cx="120" cy="120" r="108" />
          <path class="ring-wave" id="ringWave" />
        </svg>
        <div class="timer-display">
          <div class="time" id="time">25:00</div>
          <div class="phase" id="phase">Focus</div>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-secondary" id="resetBtn" aria-label="Reset timer">Reset</button>
        <button class="btn btn-primary" id="startBtn" aria-label="Start timer">Start</button>
        <button class="btn btn-secondary" id="skipBtn" aria-label="Skip phase">Skip</button>
      </div>

      <div class="meta">
        <span class="sessions">Sessions today: <strong id="sessionCount">0</strong></span>
      </div>
    </section>

    <!-- Soundscape mixer -->
    <section class="sound-card glass">
      <div class="sound-card-header">
        <h2 class="sound-title">Soundscapes</h2>
        <span class="sound-subtitle">Mix &amp; match</span>
      </div>

      <div class="presets-row" id="presetsRow">
        <!-- Built-in presets are rendered first, then custom, then the save chip last -->
        <div class="preset-save-chip" id="presetSaveChip">
          <button class="preset-save-btn" id="presetSaveBtn" type="button" aria-label="Save current mix as a preset">+ Save mix</button>
          <form class="preset-save-form" id="presetSaveForm" autocomplete="off">
            <input class="preset-save-input" id="presetSaveInput" type="text" placeholder="Name this mix…" maxlength="24" aria-label="Mix name" />
          </form>
        </div>
      </div>

      <div class="mixer">
        <div class="mixer-row" data-sound="waves">
          <button class="sound-row-toggle" aria-label="Toggle Ocean Waves">
            <span class="sound-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path d="M2 11c2-2.5 4-2.5 6 0s4 2.5 6 0 4-2.5 6 0" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                <path d="M2 16c2-2.5 4-2.5 6 0s4 2.5 6 0 4-2.5 6 0" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
              </svg>
            </span>
            <span class="sound-name">Ocean Waves</span>
          </button>
          <input type="range" class="sound-volume" data-sound="waves" min="0" max="100" value="60" aria-label="Ocean Waves volume" />
        </div>

        <div class="mixer-row" data-sound="rain">
          <button class="sound-row-toggle" aria-label="Toggle Rain on Water">
            <span class="sound-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path d="M6 4l-2 8M11 5l-2 8M16 4l-2 8M21 5l-2 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
              </svg>
            </span>
            <span class="sound-name">Rain on Water</span>
          </button>
          <input type="range" class="sound-volume" data-sound="rain" min="0" max="100" value="50" aria-label="Rain volume" />
        </div>

        <div class="mixer-row" data-sound="underwater">
          <button class="sound-row-toggle" aria-label="Toggle Underwater">
            <span class="sound-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <circle cx="6" cy="9" r="1.5" stroke="currentColor" stroke-width="1.3" fill="none"/>
                <circle cx="14" cy="13" r="2.2" stroke="currentColor" stroke-width="1.3" fill="none"/>
                <circle cx="19" cy="7" r="1" stroke="currentColor" stroke-width="1.3" fill="none"/>
                <circle cx="10" cy="18" r="0.9" stroke="currentColor" stroke-width="1.3" fill="none"/>
              </svg>
            </span>
            <span class="sound-name">Underwater</span>
          </button>
          <input type="range" class="sound-volume" data-sound="underwater" min="0" max="100" value="55" aria-label="Underwater volume" />
        </div>

        <div class="mixer-row" data-sound="thunder">
          <button class="sound-row-toggle" aria-label="Toggle Soft Thunder">
            <span class="sound-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path d="M13 2L5 14h5l-2 8 11-13h-6l1-7z" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="sound-name">Soft Thunder</span>
          </button>
          <input type="range" class="sound-volume" data-sound="thunder" min="0" max="100" value="45" aria-label="Thunder volume" />
        </div>
      </div>

      <div class="master-row">
        <span class="master-label">Master</span>
        <input type="range" id="masterVolume" min="0" max="100" value="50" aria-label="Master volume" />
        <span class="vol-value" id="volValue">50</span>
      </div>
    </section>

    <!-- Settings (subtle, collapsed) -->
    <details class="settings glass-subtle">
      <summary>Settings</summary>
      <div class="setting-row">
        <label for="chimeVolume">Chime volume</label>
        <div class="setting-slider-group">
          <input type="range" id="chimeVolume" min="0" max="100" value="25" aria-label="Chime volume" />
          <span class="setting-slider-value" id="chimeVolumeValue">25</span>
        </div>
      </div>

      <div class="setting-row setting-row-block">
        <label>Theme</label>
        <div class="theme-picker" id="themePicker">
          <button type="button" class="theme-chip" data-theme="default" aria-label="Coral Reef theme">
            <span class="theme-swatch" style="background: linear-gradient(135deg, #7fd1c5, #2d7a8c, #0e3d4c)"></span>
            <span class="theme-name">Coral Reef</span>
          </button>
          <button type="button" class="theme-chip" data-theme="abyss" aria-label="Deep Abyss theme">
            <span class="theme-swatch" style="background: linear-gradient(135deg, #6ad0c0, #173545, #02080e)"></span>
            <span class="theme-name">Deep Abyss</span>
            <span class="pro-badge-mini">PRO</span>
          </button>
          <button type="button" class="theme-chip" data-theme="arctic" aria-label="Arctic theme">
            <span class="theme-swatch" style="background: linear-gradient(135deg, #d8eff5, #94bbcf, #2d4a65)"></span>
            <span class="theme-name">Arctic</span>
            <span class="pro-badge-mini">PRO</span>
          </button>
          <button type="button" class="theme-chip" data-theme="twilight" aria-label="Twilight Cove theme">
            <span class="theme-swatch" style="background: linear-gradient(135deg, #f0c5b0, #a06480, #1e1a45)"></span>
            <span class="theme-name">Twilight Cove</span>
            <span class="pro-badge-mini">PRO</span>
          </button>
        </div>
      </div>
    </details>

    <footer class="footer">
      <span>made with calm · v0.1</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
